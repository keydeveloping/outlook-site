services:
  outlook-web:
    build: .
    container_name: outlook-web-inbox
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-change_me_to_strong_password}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - SESSION_LIFETIME_HOURS=${SESSION_LIFETIME_HOURS:-4}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_MAX_ATTEMPTS=${RATE_LIMIT_MAX_ATTEMPTS:-5}
      - RATE_LIMIT_LOCKOUT_MINUTES=${RATE_LIMIT_LOCKOUT_MINUTES:-15}
      - RATE_LIMIT_SLIDING_WINDOW_MINUTES=${RATE_LIMIT_SLIDING_WINDOW_MINUTES:-5}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
